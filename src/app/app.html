<!-- Sistema de Notificaciones Globales -->
<p-toast></p-toast>

<!-- Barra de navegación minimalista superior -->
<nav
  class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-xs"
>
  <div class="flex items-center gap-2">
    <span class="text-xl font-black text-indigo-600 tracking-tight">Avisolocal.cl</span>
  </div>
  <div class="flex gap-4 items-center">
    <a
      routerLink="/directorio"
      routerLinkActive="text-indigo-600 font-semibold"
      [routerLinkActiveOptions]="{ exact: true }"
      class="text-sm text-slate-600 hover:text-indigo-600 transition-colors"
    >
      <i class="pi pi-th-large mr-1"></i> Directorio
    </a>
    <a
      routerLink="/registrar"
      routerLinkActive="text-indigo-600 font-semibold"
      class="text-sm text-slate-600 hover:text-indigo-600 transition-colors"
    >
      <i class="pi pi-plus mr-1"></i> Registrar Negocio
    </a>
    <div class="border-l border-slate-300 pl-4">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="text-amber-600 font-semibold"
        class="text-sm text-slate-600 hover:text-amber-600 transition-colors"
      >
        <i class="pi pi-shield mr-1"></i> Admin
      </a>
    </div>
  </div>
</nav>
